<html lang="en">
  <head>

    <!-- PWA -->
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="#064e3b" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="BloomSense" />

    <!-- Fonts -->
    <link rel="dns-prefetch" href="https://fonts.googleapis.com">
    <link rel="dns-prefetch" href="https://fonts.gstatic.com">

    <!-- Google Translate Script -->
    <script type="text/javascript">
      function googleTranslateElementInit() {
        if (document.getElementById('google_translate_element')) {
          new google.translate.TranslateElement({pageLanguage: 'en', layout: google.translate.TranslateElement.InlineLayout.SIMPLE, autoDisplay: false}, 'google_translate_element');
        }
        if (document.getElementById('google_translate_element_calendar')) {
          new google.translate.TranslateElement({pageLanguage: 'en', layout: google.translate.TranslateElement.InlineLayout.SIMPLE, autoDisplay: false}, 'google_translate_element_calendar');
        }
      }
    </script>
    <script type="text/javascript" src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>

    <!-- SEO & Social -->
    <meta name="description" content="BloomSense: Decode Nature's Secrets with Precision AI. Offline-capable botanical disease detection and crop advisory platform for Indian farmers." />
    <meta name="keywords" content="crop disease detection, botanical AI, farmer app, crop calendar, rice blast, plant disease, BloomSense" />
    <meta property="og:title" content="BloomSense | Botanical AI" />
    <meta property="og:description" content="AI-powered plant disease detection and crop advisory for Indian farmers. Works offline." />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />

    <title>BloomSense | Botanical AI</title>
  </head>
